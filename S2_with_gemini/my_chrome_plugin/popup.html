<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h3>Top 5 Gainers</h3>
    <table id="gainers-table">
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Price</th>
          <th>Change %</th>
        </tr>
      </thead>
      <tbody id="gainers-body"></tbody>
    </table>

    <h3>Top 5 Losers</h3>
    <table id="losers-table">
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Price</th>
          <th>Change %</th>
        </tr>
      </thead>
      <tbody id="losers-body"></tbody>
    </table>

    <div id="loader">Fetching live market data...</div>
    <div id="tooltip" class="tooltip" style="display: none;"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
